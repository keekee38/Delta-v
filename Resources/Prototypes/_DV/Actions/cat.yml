- type: entity
  parent: BaseAction
  id: ActionCatJump
  name: Pounce
  description: Being nature's most fearsome predator, you pounce forward in the direction of your gaze.
  components:
  - type: Action
    useDelay: 3
    icon: "Nyanotrasen/Icons/verbiconfangs.png"
  - type: InstantAction
    event: !type:GravityJumpEvent {}

- type: entity
  parent: BaseToggleAction
  id: ActionToggleRootableFelinid
  name: Sink Claws
  description: Begin or stop clawing the floor.
  components:
  - type: Action
    icon: _DV/Actions/sinkclaws/claws-off.png
    iconOn: _DV/Actions/sinkclaws/claws-on.png
    itemIconStyle: NoItem
    useDelay: 3
