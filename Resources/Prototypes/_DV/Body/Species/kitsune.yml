- type: markingsGroup
  id: Kitsune
  parent: Undergarments
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Snout:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ KitsuneTailDefault ]
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      default: [ KitsuneEarsDefault ]
    enum.HumanoidVisualLayers.Chest:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 4
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 4
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 4
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 4
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceKitsune
  name: kitsune appearance
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: InitialBody
    organs:
      Torso: OrganKitsuneTorso
      Head: OrganKitsuneHead
      ArmLeft: OrganKitsuneArmLeft
      ArmRight: OrganKitsuneArmRight
      HandLeft: OrganKitsuneHandLeft
      HandRight: OrganKitsuneHandRight
      LegLeft: OrganKitsuneLegLeft
      LegRight: OrganKitsuneLegRight
      FootLeft: OrganKitsuneFootLeft
      FootRight: OrganKitsuneFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Ears: OrganHumanEars
      Appendix: OrganHumanAppendix
      Lungs: OrganHumanLungs
      Heart: OrganAnimalHeart
      Stomach: OrganAnimalStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Kitsune

- type: entity
  parent:
  - AppearanceKitsune
  - BaseSpeciesMobOrganic
  id: MobKitsune
  name: Urist McKitsune
  components:
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 0.35
        density: 160
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Damageable
    damageContainer: BiologicalMetaphysical
    damageModifierSet: Kitsune
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#808A51"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: Speech
    speechSounds: Alto
    allowedEmotes: ['Growl', 'Squeak']
  - type: Vocal
    sounds:
      Male: MaleKitsune
      Female: FemaleKitsune
      Unsexed: MaleKitsune
  - type: TypingIndicator
    proto: kitsune
  - type: InteractionPopup
    interactSuccessString: petting-success-soft-floofy-kitsune
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/fox_squeak.ogg
  - type: Kitsune
  - type: PotentialPsionic
    speciesBonusChance: 0.05 # Additional 5% chance to roll a psionic power.
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Items/hiss.ogg
    animation: WeaponArcClaw
    damage:
      types:
        Heat: 5
  - type: LightweightDrunk
    boozeStrengthMultiplier: 3
  - type: PseudoItem
    storedOffset: "0,17"
    shape:
    - 0,0,1,4
    - 0,2,3,4
    - 4,0,5,4

- type: entity
  parent: OrganBase
  id: OrganKitsune
  abstract: true
  suffix: Kitsune

- type: entity
  parent: OrganKitsune
  id: OrganKitsuneInternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi

- type: entity
  parent: OrganKitsune
  id: OrganKitsuneExternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/parts.rsi
  - type: VisualOrgan
    data:
      sprite: Mobs/Species/Human/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Kitsune

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, OrganKitsuneExternal ]
  id: OrganKitsuneHead

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, OrganKitsuneExternal ]
  id: OrganKitsuneTorso

- type: entity
  parent: [ OrganBaseArmLeft, OrganKitsuneExternal ]
  id: OrganKitsuneArmLeft

- type: entity
  parent: [ OrganBaseArmRight, OrganKitsuneExternal ]
  id: OrganKitsuneArmRight

- type: entity
  parent: [ OrganBaseHandLeft, OrganKitsuneExternal ]
  id: OrganKitsuneHandLeft

- type: entity
  parent: [ OrganBaseHandRight, OrganKitsuneExternal ]
  id: OrganKitsuneHandRight

- type: entity
  parent: [ OrganBaseLegLeft, OrganKitsuneExternal ]
  id: OrganKitsuneLegLeft

- type: entity
  parent: [ OrganBaseLegRight, OrganKitsuneExternal ]
  id: OrganKitsuneLegRight

- type: entity
  parent: [ OrganBaseFootLeft, OrganKitsuneExternal ]
  id: OrganKitsuneFootLeft

- type: entity
  parent: [ OrganBaseFootRight, OrganKitsuneExternal ]
  id: OrganKitsuneFootRight
