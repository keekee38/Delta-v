- type: entity
  parent: [ OrganBaseLungs, OrganHarpyInternal ]
  id: OrganHarpyLungs
  name: harpy lungs
  description: "An advanced pair of avian lungs. Filters oxygen by way of moving air constantly through air sacs."
  components:
  - type: Metabolizer
    solutionOnBody: false
    metabolizerTypes: [ Harpy ]
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      Lung:
        maxVol: 100.0
        canReact: false
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
