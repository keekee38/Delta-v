      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Metabolizer
    # mm yummy
    maxReagents: 3
    metabolizerTypes: [Animal]

