- type: entity
  parent: [ OrganBaseStomach, OrganFeroxiInternal ]
  id: OrganFeroxiStomach
  name: feroxian stomach
  categories: [ HideSpawnMenu ]
  components:
  - type: Stomach
    specialDigestible:
      tags:
      - ReptilianFood
      - Meat
      - Pill
      - Crayon
      - Paper
  - type: Metabolizer
    maxReagents: 3
    metabolizerTypes: [ Feroxi, Animal ]
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5

- type: entity
  parent: [ OrganBaseLungs, OrganFeroxiInternal ]
  id: OrganFeroxiLungs
  name: feroxian lungs and gills
  description: "A pair of amphibious lungs along with gills, filtering oxygen out of the air continuously."
  components:
  - type: Metabolizer
    solutionOnBody: false
    metabolizerTypes: [ Feroxi ]
  - type: SolutionContainerManager
    solutions:
      organ:
        maxVol: 10
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      Lung:
        maxVol: 100
        canReact: False
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
