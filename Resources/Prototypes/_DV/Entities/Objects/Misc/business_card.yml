- type: entity
  id: HitmanBusinessCard
  name: hitman business card
  parent: [ Paper, BaseMajorContraband ]
  description: A black card with a crosshair. There's something on the back.
  components:
    - type: Sprite
      sprite: Objects/Misc/bureaucracy.rsi
      layers:
      - state: hitman_card
      - state: hitman_card
        map: ["enum.PaperVisualLayers.Writing"]
        visible: false
      - state: paper_stamp-generic
        map: ["enum.PaperVisualLayers.Stamp"]
        visible: false
    - type: PaperVisuals
      headerImagePath: "/Textures/_DV/Interface/Paper/paper_heading_Hitman_logo.svg.96dpi.png"
      headerMargin: 0.0, 0.0, 0.0, 2.0
      backgroundImagePath: "/Textures/_DV/Interface/Paper/paper_background_hitman.svg.96dpi.png"
      backgroundPatchMargin: 16.0, 16.0, 16.0, 16.0
      contentMargin: 4.0, 4.0, 4.0, 4.0
      maxWritableArea: 400.0, 256.0
    - type: Paper
      content: paper-hitman-business-card
