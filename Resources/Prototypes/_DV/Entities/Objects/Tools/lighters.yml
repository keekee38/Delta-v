- type: entity
  parent: FlippoLighter
  id: SyndicateFlippoDV
  name: Blood-red flippo
  suffix: Gun, Regenerates Fuel
  description: "A 'Valid' choice in lighters. Contains no copper. This one seems to have a few extra features."
  components:
  - type: Sprite
    sprite: _DV/Objects/Tools/syndielighter.rsi
    layers:
    - state: icon
      map: ["base"]
    - state: top
      map: ["top"]
      visible: false
    - state: open
      map: ["open"]
      visible: false
    - state: fire
      map: ["flame"]
      visible: false
      shader: unshaded
  - type: Item
    sprite: _DV/Objects/Tools/syndielighter.rsi
  - type: Welder #removed lighting and upkeep to make it easier to judge how many shots you have
    fuelConsumption: 0
    fuelLitCost: 0
    tankSafe: false
  - type: SolutionAmmoProvider
    proto: BulletLighterIncendiary
    fireCost: 3
    solutionId: Welder
  - type: ComponentToggler
    components:
    - type: Gun
      soundGunshot:
        path: /Audio/Weapons/Guns/Gunshots/water_spray.ogg
      soundEmpty:
        path: /Audio/_DV/Weapons/Guns/Empty/dry_fire.ogg
      showExamineText: false
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        flame:
          True: { visible: true }
          False: { visible: false }
        open:
          True: { visible: true }
          False: { visible: false }
        top:
          True: { visible: true }
          False: { visible: false }
        base:
          True: { visible: false }
          False: { visible: true }
  - type: ToggleableVisuals
    spriteLayer: lighter_flame
    inhandVisuals:
      left:
      - state: inhand-left-lit
        shader: unshaded
      right:
      - state: inhand-right-lit
        shader: unshaded
  - type: ItemTogglePointLight
  - type: PointLight
    enabled: false
    netsync: false
    radius: 2 #much stronger than the other lighters
    color: green
  - type: SolutionRegeneration
    solution: Welder
    generated:
      reagents:
      - ReagentId: WeldingFuel
        Quantity: 0.1

# Loadout nerfed lighters for loadouts

- type: entity
  abstract: true
  parent: BaseBrandedLighter
  id: BaseBrandedLighterNerfed
  suffix: Nerfed
  components:
  - type: Welder
    fuelConsumption: 0.01
    fuelLitCost: 0.1
    tankSafe: true
  - type: MeleeWeapon
    wideAnimationRotation: 180
    damage:
      types:
        Blunt: 1 # does a little bit of damage on hit when off
  - type: PointLight
    enabled: false
    netsync: false
    radius: 1.2

- type: entity
  parent: BaseBrandedLighterNerfed
  id: WaffleCoFlippoNerfed
  name: Waffle Co. flippo
  description: "A mass produced lighter. The Waffle Co. logo turns the spark wheel when pushed up, minimising risk of lighter burns for even the most inept user."
  components:
  - type: Sprite
    sprite: Objects/Tools/Lighters/waffleco.rsi
  - type: Item
    sprite: Objects/Tools/Lighters/waffleco.rsi
  - type: PointLight
    color: brown

- type: entity
  parent: BaseBrandedLighterNerfed
  id: HonkCoFlippoNerfed
  name: Honk Co. flippo
  description: "A rubbery gag lighter produced by Honk Co. hidden inside of a plastic banana peel."
  components:
  - type: Sprite
    sprite: Objects/Tools/Lighters/honkco.rsi
  - type: Item
    sprite: Objects/Tools/Lighters/honkco.rsi
  - type: PointLight
