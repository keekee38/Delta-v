  - type: Sprite
    sprite: Objects/Tools/Lighters/centcomm.rsi
  - type: Item
    sprite: Objects/Tools/Lighters/centcomm.rsi
  - type: ItemToggleRequiresLock
    requireLocked: false
  - type: PointLight
    color: Gold
  - type: Lock
  - type: AccessReader
    access: [["CentralCommand"]]
