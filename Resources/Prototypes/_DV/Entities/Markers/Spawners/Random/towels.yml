- type: entity
  parent: MarkerBase
  id: TowelSpawner
  name: random towel spawner
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    sprite: Clothing/Multiple/towel.rsi
    layers:
    - state: icon
  - type: EntityTableSpawner
    table: !type:GroupSelector
      prob: 0.90
      children:
      - id: TowelColorWhite
      - id: TowelColorTeal
      - id: TowelColorBrown
      - id: TowelColorPink
      - !type:GroupSelector
        weight: 0.1
        children:
        - id: TowelColorPurple
        - id: TowelColorRed
        - id: TowelColorBlue
        - id: TowelColorDarkBlue
        - id: TowelColorLightBlue
        - id: TowelColorLightBrown
        - id: TowelColorGray
        - id: TowelColorGreen
        - id: TowelColorDarkGreen
        - id: TowelColorOrange
        - id: TowelColorBlack
        - id: TowelColorYellow
        - id: TowelColorMaroon
      - !type:GroupSelector
        weight: 0.05
        children:
        - id: TowelColorGold
          weight: 0.5
        - id: TowelColorSilver
      - !type:GroupSelector
        weight: 0.005
        children:
        - id: TowelColorNT
        - id: TowelColorCentcom
        - id: TowelColorSyndicate
          weight: 0.33
