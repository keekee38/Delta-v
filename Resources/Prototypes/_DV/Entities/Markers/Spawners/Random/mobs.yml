- type: entity
  parent: MarkerBase
  id: CarpSpawnerMundane
  name: random carp spawner
  suffix: No Ghost Takeover
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Mobs/Aliens/Carps/space.rsi
      state: icon
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: MobCarp
      - id: MobCarpMagic
      - id: MobCarpHolo
      - id: MobCarpRainbow
      - id: MobShark
        weight: 0.05

