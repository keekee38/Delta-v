#Spawner
- type: entity
  parent: MarkerBase
  id: RandomItem
  name: random item spawner
  components:
  - type: Sprite
    layers:
      - state: red
      - sprite: Objects/Fun/dice.rsi
        state: d20_20
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: RandomItemTable
      prob: 0.75

