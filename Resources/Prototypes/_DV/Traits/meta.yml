- type: trait
  id: MarkedAsProtected
  name: trait-protected-name
  description: trait-protected-desc
  category: Meta
  conditions:
  - !type:InDepartmentCondition
    department: Command
    invert: true
  - !type:InDepartmentCondition
    department: Security
    invert: true
  - !type:IsAntagEligibleCondition
    antag: Thief
    invert: true
  - !type:IsAntagEligibleCondition
    antag: Traitor
    invert: true
  - !type:IsAntagEligibleCondition
    antag: TraitorSleeper
    invert: true
  effects:
  - !type:AddCompsEffect
    components:
    - type: TargetObjectiveImmune

- type: trait
  id: NoParadoxClone
  name: trait-no-paradox-clone-name
  description: trait-no-paradox-clone-desc
  category: Meta
  conditions:
  - !type:InDepartmentCondition
    department: Command
    invert: true
  - !type:InDepartmentCondition
    department: Security
    invert: true
  effects:
  - !type:AddCompsEffect
    components:
    - type: NoParadoxClone

- type: trait
  id: SyntheticMechanical
  name: trait-mechanical-synthetic-name
  description: trait-mechanical-synthetic-desc
  category: Meta
  conditions:
  - !type:TraitDependencyCondition
    requires:
      - Synthetic
  effects:
  - !type:AddCompsEffect
    components:
    - type: ESSparkOnHit
      count: 2
      prob: .32

- type: trait
  id: SyntheticIonStormSusceptible
  name: trait-ion-storm-susceptible-name
  description: trait-ion-storm-susceptible-desc
  category: Meta
  conditions:
  - !type:TraitDependencyCondition
    requires:
      - Synthetic
  effects:
  - !type:OverrideCompsEffect
    components:
    - type: Synth
      ionStormAffected: true
