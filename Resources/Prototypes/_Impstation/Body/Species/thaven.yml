- type: markingsGroup
  id: Thaven
  onlyGroupWhitelisted: true
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.HeadTop:
      limit: 4 # DeltaV - was previously 2, more markings require more space
      required: false
    enum.HumanoidVisualLayers.HeadSide:
      limit: 1
      required: true
      default: [ ThavenEars1 ]
    enum.HumanoidVisualLayers.Head:
      limit: 4
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 4
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 4
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 4
      required: false
    enum.HumanoidVisualLayers.Overlay:
      limit: 6
      required: false
    enum.HumanoidVisualLayers.Snout:
      limit: 1
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceThaven
  name: thaven appearance
  components:
  - type: Inventory
    templateId: thaven
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi
            state: jumpsuit
      head:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi
            state: head
      eyes:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi
            state: eyes
      ears:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi
            state: head
      mask:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi
            state: mask
      neck:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi
            state: neck
      outerClothing:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi
            state: outerclothing_hardsuit
      gloves:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Thaven/displacement.rsi
            state: hands
  - type: InitialBody
    organs:
      Torso: OrganThavenTorso
      Head: OrganThavenHead
      ArmLeft: OrganThavenArmLeft
      ArmRight: OrganThavenArmRight
      HandLeft: OrganThavenHandLeft
      HandRight: OrganThavenHandRight
      LegLeft: OrganThavenLegLeft
      LegRight: OrganThavenLegRight
      FootLeft: OrganThavenFootLeft
      FootRight: OrganThavenFootRight
      Brain: OrganThavenBrain
      Eyes: OrganThavenEyes
      Ears: OrganHumanEars
      Appendix: OrganHumanAppendix
      Lungs: OrganHumanLungs
      Heart: OrganHumanHeart
      Stomach: OrganHumanStomach
      Liver: OrganHumanLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Thaven
  - type: ScaleVisuals
    speciesScale: 1.0, 1.05

- type: entity
  parent:
  - AppearanceThaven
  - BaseSpeciesMobOrganic
  id: MobThaven
  name: Urist McEars
  components:
  - type: Icon
    sprite: _Impstation/Mobs/Species/Thaven/parts.rsi # Unlike dwarves elves are NOT made of slime
    state: full
  - type: ThavenMoods
  - type: Respirator
    damage:
      types:
        Asphyxiation: 2
    damageRecovery:
      types:
        Asphyxiation: -1.0
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Thaven
  - type: MeleeWeapon
    attackRate: 0.55
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Blunt: 0
  - type: StaminaDamageOnHit
    damage: 18
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodThavenMeat
      amount: 5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 120
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: TypingIndicator
    proto: Thaven # DeltaV unique typing indicator
  - type: Vocal
    sounds:
      Male: MaleThaven
      Female: FemaleThaven
      Unsexed: UnisexThaven
  - type: Speech
    speechSounds: Alto
  - type: UserInterface
    interfaces:
      enum.ThavenMoodsUiKey.Key: # impstation edit
        type: ThavenMoodsBoundUserInterface
        requireInputValidation: false
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: CosmicMarkVisuals # DeltaV - cosmic cult
    offset: 0, 0.0625 #2 pixels up

- type: entity
  parent: OrganBase
  id: OrganThaven
  abstract: true
  suffix: Thaven

- type: entity
  parent: OrganThaven
  id: OrganThavenInternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi

- type: entity
  parent: OrganThaven
  id: OrganThavenExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _Impstation/Mobs/Species/Thaven/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _Impstation/Mobs/Species/Thaven/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Thaven

- type: entity
  parent: [ OrganBaseEyes, OrganThavenExternal, OrganThavenInternal ]
  id: OrganThavenEyes
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi
  - type: VisualOrgan
    layer: enum.HumanoidVisualLayers.Eyes
    data:
      sprite: _Impstation/Mobs/Species/Thaven/parts.rsi # Delta V - Using DV Eyes
      state: eyes
